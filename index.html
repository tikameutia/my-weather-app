<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My weather app</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <form action="">
      <input type="text" name="city" id="city-search-input" />
      <input type="submit" value="search" />
    </form>
    <h1 id="city">Venice</h1>
    <h2>
      <span id="current-low-temperature">10</span>°C ~
      <span id="current-high-temperature">18</span>°C
    </h2>

    <div id="current-day">Tuesday</div>
    <span id="current-hour">13</span>:<span id="current-minute">35</span>
    <div id="current-weather-description">sunny</div>
    <br />
    <div class="forecast">
      <div class="day">Tomorrow</div>
      <div>10°C ~ 12°C</div>
      <div class="day">Thursday</div>
      <div>12°C ~ 16°C</div>
      <div class="day">Friday</div>
      <div>9°C ~ 18°C</div>
    </div>
    <footer>
      This project was coded by Tika Meutia Lubis and is on GitHub and hosted on
      Netlify
    </footer>
  </body>
</html>
