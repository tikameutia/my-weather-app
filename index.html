<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My weather app</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Yeseva+One&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div class="container">
      <form>
        <input
          type="text"
          name="city"
          id="city-search-input"
          placeholder="City name (e.g. Paris, Tokyo)"
          autocomplete="off"
        />
        <input type="submit" value="search" id="city-search-button" />
      </form>
      <div class="current-weather-container">
        <div class="current-weather-container-left">
          <h1 id="city">Venice</h1>
          <h2>
            <span id="current-low-temperature">10</span>°C ~
            <span id="current-high-temperature">18</span>°C
          </h2>
          <div>
            <span id="current-day">Tuesday</span>
            <span id="current-hour">13</span>:<span id="current-minute"
              >35</span
            >
          </div>
        </div>
        <div class="current-weather-container-right">
          <div id="current-weather-symbol">☀️</div>
          <div id="current-weather-description">sunny</div>
        </div>
        <br />
      </div>

      <ul class="weather-forecast-container">
        <li>
          <div class="day">Tomorrow</div>
          <div>☁️</div>
          <div>10°C ~ 12°C</div>
        </li>
        <li>
          <div class="day">Thursday</div>
          <div>⛅</div>
          <div>12°C ~ 16°C</div>
        </li>
        <li>
          <div class="day">Friday</div>
          <div>🌦️</div>
          <div>9°C ~ 18°C</div>
        </li>
      </ul>

      <footer>
        This project was coded by
        <a
          href="https://github.com/tikameutia"
          target="_blank"
          rel="noopener noreferrer"
          >Tika Meutia Lubis</a
        >
        and is on
        <a
          href="https://github.com/tikameutia/my-weather-app"
          target="_blank"
          rel="noopener noreferrer"
          >GitHub</a
        >
        and hosted on Netlify
      </footer>
    </div>
  </body>
</html>
