<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My weather app</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div class="container">
      <form action="">
        <input type="text" name="city" id="city-search-input" />
        <input type="submit" value="search" />
      </form>
      <div class="current-weather-container">
        <div class="current-weather-container-left">
          <h1 id="city">Venice</h1>
          <h2>
            <span id="current-low-temperature">10</span>°C ~
            <span id="current-high-temperature">18</span>°C
          </h2>
          <div>
            <span id="current-day">Tuesday</span>
            <span id="current-hour">13</span>:<span id="current-minute"
              >35</span
            >
          </div>
        </div>
        <div class="current-weather-container-right">
          <div id="current-weather-symbol">☀️</div>
          <div id="current-weather-description">sunny</div>
        </div>
        <br />
      </div>

      <ul class="weather-forecast-container">
        <li>
          <div class="day">Tomorrow</div>
          <div>10°C ~ 12°C</div>
        </li>
        <li>
          <div class="day">Thursday</div>
          <div>12°C ~ 16°C</div>
        </li>
        <li>
          <div class="day">Friday</div>
          <div>9°C ~ 18°C</div>
        </li>
      </ul>

      <footer>
        This project was coded by
        <a
          href="https://github.com/tikameutia"
          target="_blank"
          rel="noopener noreferrer"
          >Tika Meutia Lubis</a
        >
        and is on
        <a
          href="https://github.com/tikameutia/my-weather-app"
          target="_blank"
          rel="noopener noreferrer"
        ></a
        >GitHub and hosted on Netlify
      </footer>
    </div>
  </body>
</html>
